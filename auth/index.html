<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #F9F7F4; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

.auth-wrap { display: flex; width: 100%; max-width: 960px; min-height: 560px; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06); }

/* Left panel */
.auth-left {
  flex: 1; background: #1E3A8A; padding: 48px 40px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
}
.auth-left::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 20% 80%, rgba(37,99,235,0.5) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(249,115,22,0.15) 0%, transparent 50%);
}
.auth-left-content { position: relative; z-index: 1; }
.auth-logo { margin-bottom: 48px; }
.auth-logo img { height: 30px; }
.auth-tagline { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 26px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 16px; }
.auth-desc { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; max-width: 280px; }
.auth-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 32px; }
.auth-pill { padding: 6px 12px; border-radius: 9999px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); font-size: 12px; color: rgba(255,255,255,0.8); }
.auth-footer-left { position: relative; z-index: 1; font-size: 11px; color: rgba(255,255,255,0.35); }

/* Right panel */
.auth-right { width: 420px; background: #fff; padding: 48px 40px; display: flex; flex-direction: column; justify-content: center; }
.auth-form-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 6px; }
.auth-form-sub { font-size: 13px; color: #6B7280; margin-bottom: 32px; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 5px; }
.field-input {
  display: flex; align-items: center; gap: 8px;
  border: 1px solid #E5E7EB; border-radius: 8px; padding: 10px 12px;
  background: #fff; transition: border-color 150ms, box-shadow 150ms;
}
.field-input:focus-within { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
.field-input.error { border-color: #EF4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.12); }
.field-input .pi { color: #9CA3AF; font-size: 14px; flex-shrink: 0; }
.field-input input { border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 13px; color: #111827; flex: 1; background: transparent; }
.field-input input::placeholder { color: #9CA3AF; }
.field-error { font-size: 11px; color: #B91C1C; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.field-hint { font-size: 11px; color: #6B7280; margin-top: 4px; }

.btn-full { width: 100%; padding: 11px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 150ms; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-full:active { transform: scale(0.99); }
.btn-primary-full { background: #2563EB; color: #fff; }
.btn-primary-full:hover { background: #1D4ED8; }
.btn-ghost-full { background: transparent; color: #374151; border: 1px solid #E5E7EB; }
.btn-ghost-full:hover { background: #F9F7F4; }

.auth-link { font-size: 13px; color: #2563EB; cursor: pointer; font-weight: 500; }
.auth-link:hover { text-decoration: underline; }
.auth-divider { text-align: center; font-size: 12px; color: #9CA3AF; margin: 20px 0; position: relative; }
.auth-divider::before, .auth-divider::after { content: ''; position: absolute; top: 50%; width: calc(50% - 24px); height: 1px; background: #E5E7EB; }
.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }

/* Lang selector */
.lang-selector { display: flex; gap: 6px; margin-bottom: 24px; }
.lang-opt { padding: 4px 10px; border-radius: 6px; border: 1px solid #E5E7EB; font-size: 12px; font-weight: 500; color: #6B7280; cursor: pointer; background: #fff; transition: all 120ms; }
.lang-opt.active { background: #EFF6FF; border-color: #BFDBFE; color: #2563EB; }

/* Alert state */
.state-alert { background: #FEE2E2; border: 1px solid #FECACA; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #B91C1C; display: flex; gap: 8px; align-items: flex-start; margin-bottom: 16px; }
.state-warn  { background: #FEF3C7; border: 1px solid #FDE68A; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #B45309; display: flex; gap: 8px; align-items: flex-start; margin-bottom: 16px; }
.state-info  { background: #DBEAFE; border: 1px solid #BFDBFE; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #1D4ED8; display: flex; gap: 8px; align-items: flex-start; margin-bottom: 16px; }

/* Loading spinner */
.spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Tabs for demo */
.demo-tabs { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
.demo-tab { padding: 5px 12px; border-radius: 6px; border: 1px solid #E5E7EB; background: #fff; font-size: 12px; font-weight: 500; color: #6B7280; cursor: pointer; }
.demo-tab.active { background: #EFF6FF; border-color: #BFDBFE; color: #2563EB; }

@media (max-width: 700px) {
  .auth-left { display: none; }
  .auth-right { width: 100%; padding: 32px 24px; border-radius: 16px; }
  .auth-wrap { box-shadow: var(--shadow-lg); border-radius: 16px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="auth-wrap">
    <!-- Left panel -->
    <div class="auth-left">
      <div class="auth-left-content">
        <div class="auth-logo">
          <img src="../assets/logo-white.svg" alt="Nexa">
        </div>
        <div class="auth-tagline">Operaciones refrigeradas, ordenadas de verdad.</div>
        <div class="auth-desc">Catálogo, stock, pedidos, despacho y entrega en un solo lugar. Para personas reales.</div>
        <div class="auth-pills">
          <span class="auth-pill">Catálogo actualizado</span>
          <span class="auth-pill">Stock visible</span>
          <span class="auth-pill">Pedido confirmado</span>
          <span class="auth-pill">Entrega documentada</span>
        </div>
      </div>
      <div class="auth-footer-left">© 2025 Nexa · Todos los derechos reservados</div>
    </div>

    <!-- Right panel -->
    <div class="auth-right">

      <!-- Demo state tabs -->
      <div class="demo-tabs">
        <button class="demo-tab" :class="{active:screen==='login'}" @click="screen='login';errorMsg=''">Login</button>
        <button class="demo-tab" :class="{active:screen==='error'}" @click="screen='error'">Error credenciales</button>
        <button class="demo-tab" :class="{active:screen==='blocked'}" @click="screen='blocked'">Cuenta bloqueada</button>
        <button class="demo-tab" :class="{active:screen==='recover'}" @click="screen='recover';sent=false">Recuperar</button>
        <button class="demo-tab" :class="{active:screen==='loading'}" @click="screen='loading'">Cargando</button>
      </div>

      <!-- Language selector -->
      <div class="lang-selector">
        <button class="lang-opt" :class="{active:lang==='es'}" @click="lang='es'">ES</button>
        <button class="lang-opt" :class="{active:lang==='en'}" @click="lang='en'">EN</button>
      </div>

      <!-- LOGIN -->
      <template v-if="screen==='login' || screen==='error'">
        <div class="auth-form-title">{{ lang==='es' ? 'Bienvenido de nuevo' : 'Welcome back' }}</div>
        <div class="auth-form-sub">{{ lang==='es' ? 'Ingresa tus datos para continuar' : 'Sign in to your account' }}</div>

        <div class="state-alert" v-if="screen==='error'">
          <i class="pi pi-times-circle" style="flex-shrink:0;margin-top:1px"></i>
          <div><strong>Credenciales incorrectas</strong><br>Revisa tu correo y contraseña e intenta nuevamente.</div>
        </div>

        <div class="field">
          <label>{{ lang==='es' ? 'Correo electrónico' : 'Email address' }}</label>
          <div class="field-input" :class="{error:screen==='error'}">
            <i class="pi pi-envelope"></i>
            <input type="email" :placeholder="lang==='es'?'tu@empresa.cl':'you@company.com'" v-model="email">
          </div>
        </div>
        <div class="field">
          <label>{{ lang==='es' ? 'Contraseña' : 'Password' }}</label>
          <div class="field-input" :class="{error:screen==='error'}">
            <i class="pi pi-lock"></i>
            <input :type="showPass?'text':'password'" placeholder="••••••••" v-model="pass">
            <i :class="'pi '+(showPass?'pi-eye-slash':'pi-eye')" style="cursor:pointer;color:#9CA3AF" @click="showPass=!showPass"></i>
          </div>
          <div class="field-error" v-if="screen==='error'"><i class="pi pi-exclamation-circle"></i> Contraseña incorrecta</div>
        </div>
        <div style="text-align:right;margin-bottom:20px">
          <span class="auth-link" @click="screen='recover'">{{ lang==='es' ? '¿Olvidaste tu contraseña?' : 'Forgot password?' }}</span>
        </div>
        <button class="btn-full btn-primary-full" @click="doLogin">
          {{ lang==='es' ? 'Ingresar' : 'Sign in' }}
        </button>
      </template>

      <!-- BLOCKED -->
      <template v-if="screen==='blocked'">
        <div class="auth-form-title">Cuenta no disponible</div>
        <div class="auth-form-sub">Tu acceso requiere atención</div>
        <div class="state-warn">
          <i class="pi pi-exclamation-triangle" style="flex-shrink:0;margin-top:1px"></i>
          <div><strong>Cuenta pendiente de activación</strong><br>Tu cuenta fue creada pero aún no ha sido activada por el administrador. Recibirás un correo cuando esté lista.</div>
        </div>
        <div class="state-alert">
          <i class="pi pi-ban" style="flex-shrink:0;margin-top:1px"></i>
          <div><strong>Cuenta bloqueada</strong><br>Por razones de seguridad, tu cuenta fue bloqueada temporalmente. Contacta al administrador.</div>
        </div>
        <button class="btn-full btn-ghost-full" @click="screen='login'"><i class="pi pi-arrow-left"></i> Volver al inicio</button>
      </template>

      <!-- RECOVER -->
      <template v-if="screen==='recover'">
        <template v-if="!sent">
          <div class="auth-form-title">Recuperar contraseña</div>
          <div class="auth-form-sub">Te enviaremos un enlace para restablecer tu acceso</div>
          <div class="field">
            <label>Correo electrónico</label>
            <div class="field-input">
              <i class="pi pi-envelope"></i>
              <input type="email" placeholder="tu@empresa.cl" v-model="recoverEmail">
            </div>
          </div>
          <button class="btn-full btn-primary-full" style="margin-bottom:12px" @click="sent=true">Enviar enlace</button>
          <button class="btn-full btn-ghost-full" @click="screen='login'"><i class="pi pi-arrow-left"></i> Volver al inicio</button>
        </template>
        <template v-else>
          <div style="text-align:center;padding:24px 0">
            <div style="width:56px;height:56px;border-radius:50%;background:#DCFCE7;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
              <i class="pi pi-check" style="font-size:22px;color:#15803D"></i>
            </div>
            <div class="auth-form-title" style="text-align:center">Revisa tu correo</div>
            <div class="auth-form-sub" style="text-align:center;margin-bottom:24px">Enviamos un enlace a <strong>{{recoverEmail || 'tu@empresa.cl'}}</strong>. El enlace expira en 30 minutos.</div>
            <button class="btn-full btn-ghost-full" @click="screen='login';sent=false"><i class="pi pi-arrow-left"></i> Volver al inicio</button>
          </div>
        </template>
      </template>

      <!-- LOADING -->
      <template v-if="screen==='loading'">
        <div class="auth-form-title">Ingresando...</div>
        <div class="auth-form-sub">Verificando tus credenciales</div>
        <div class="field">
          <label>Correo electrónico</label>
          <div class="field-input"><i class="pi pi-envelope"></i><input type="email" value="maria@nexadist.cl" disabled></div>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="field-input"><i class="pi pi-lock"></i><input type="password" value="••••••••" disabled></div>
        </div>
        <button class="btn-full btn-primary-full" disabled style="opacity:0.8">
          <div class="spinner"></div> Verificando...
        </button>
      </template>

    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3.4.0/dist/vue.global.prod.js"></script>
<script>
Vue.createApp({
  setup() {
    const { ref } = Vue;
    const screen = ref('login');
    const lang = ref('es');
    const email = ref('');
    const pass = ref('');
    const showPass = ref(false);
    const sent = ref(false);
    const recoverEmail = ref('');

    function doLogin() {
      if (!email.value || !pass.value) { screen.value = 'error'; return; }
      screen.value = 'loading';
      setTimeout(() => { window.location.href = '../nexa-ops/index.html'; }, 1500);
    }

    return { screen, lang, email, pass, showPass, sent, recoverEmail, doLogin };
  }
}).mount('#app');
</script>
</body>
</html>
