name: Release Integrity Check

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'

jobs:
  release-integrity:
    name: Validate Release Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate SemVer tags
        run: |
          git tag --list | grep -Ev '^v[0-9]+\.[0-9]+\.[0-9]+$' && exit 1 || true
          test -z "$(git tag --list 'v2.0.0' 'v3.0.0')"
          test "$(git tag --sort=creatordate | tail -1)" = "v1.2.0"

      - name: Validate package version
        run: |
          node -e "const p=require('./package.json'); if (p.version !== '1.2.0') process.exit(1)"

      - name: Validate release notes
        run: |
          for tag in v0.1.0 v0.2.0 v1.0.0 v1.0.1 v1.1.0 v1.1.1 v1.2.0; do
            test -s "docs/releases/${tag}.md"
          done

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
