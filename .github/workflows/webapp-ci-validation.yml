name: WebApp CI Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  validate:
    name: Validate WebApp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check tracked junk files
        run: |
          if git ls-files | grep -E '(^|/)(node_modules|dist|\.DS_Store|\.env|\.env\.local|.*\.log|.*\.tmp)$'; then
            echo "Tracked junk or secret-like files found."
            exit 1
          fi
